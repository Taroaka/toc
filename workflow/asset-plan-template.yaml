# Asset plan template
asset_plan_metadata:
  topic: "string"
  source_story: "output/<topic>_<timestamp>/story.md"
  source_script: "output/<topic>_<timestamp>/script.md"
  created_at: "ISO8601"
  purpose: "reusable asset design before cut image generation"

review_contract:
  must_cover:
    - "script.md の該当 scene/cut と矛盾しない"
    - "この物語の登場人物、物語固有のアイテム、使われる場所、舞台装置、再利用 still を網羅する"
    - "再利用時の visual identity が固定できる"
    - "character_reference は全身の front / side / back 3面図として設計する"
  must_avoid:
    - "provider 固有 prompt syntax"
    - "story/script に無い新情報の追加"
    - "p550 prompt に `物語「<topic>」の sceneXX` や `sceneXX_cutYY` のような制作管理メタを残す"
  done_when:
    - "human review が approved"
    - "asset generation に必要な reference / view plan が揃う"

assets:
  characters:
    - asset_id: "protagonist"
      asset_type: "character_reference"
      source_script_selectors: ["scene1_cut1", "scene2_cut3"]
      story_purpose: "主人公の基準参照"
      visual_spec:
        identity: ["string"]
        fixed_details: ["string"]
        must_avoid: ["string"]
      generation_plan:
        output_dir: "assets/characters"
        required_views: ["front", "side", "back"]
        view_requirements: "full-body, head-to-toe, front/side/back three-view reference"
        execution_lane: "standard|bootstrap_builtin"
        bootstrap_allowed: false
        bootstrap_reason: "no_reference_seed|other"
        reference_inputs: []
        derived_from_asset_id: ""
      creation_status: "planned|created|stale|missing"
      existing_outputs: []
      review:
        status: "pending|approved|changes_requested"
        notes: ""

  objects:
    - asset_id: "tamatebako"
      asset_type: "object_reference"
      source_script_selectors: ["scene14_cut1", "scene15_cut1"]
      story_purpose: "禁忌の贈与"
      visual_spec:
        identity: ["string"]
        fixed_details: ["string"]
        must_avoid: ["string"]
      generation_plan:
        output_dir: "assets/objects"
        required_views: ["hero"]
        execution_lane: "standard|bootstrap_builtin"
        bootstrap_allowed: false
        bootstrap_reason: "no_reference_seed|other"
        reference_inputs: []
        derived_from_asset_id: ""
      creation_status: "planned|created|stale|missing"
      existing_outputs: []
      review:
        status: "pending|approved|changes_requested"
        notes: ""

  locations:
    - asset_id: "sea_temple_interior"
      asset_type: "location_anchor"
      source_script_selectors: ["scene3.5_cut4", "scene6_cut2"]
      story_purpose: "海底神殿の再利用アンカー"
      visual_spec:
        identity: ["string"]
        fixed_details: ["string"]
        must_avoid: ["string"]
      generation_plan:
        output_dir: "assets/locations"
        required_views: ["hero"]
        execution_lane: "standard|bootstrap_builtin"
        bootstrap_allowed: false
        bootstrap_reason: "no_reference_seed|other"
        reference_inputs: []
        derived_from_asset_id: ""
      creation_status: "planned|created|stale|missing"
      existing_outputs: []
      review:
        status: "pending|approved|changes_requested"
        notes: ""

  reusable_stills:
    - asset_id: "scene15_cut03_day_anchor"
      asset_type: "reusable_still"
      source_script_selectors: ["scene15_cut3"]
      story_purpose: "昼夜切替の基準 still"
      visual_spec:
        identity: ["string"]
        fixed_details: ["string"]
        must_avoid: ["string"]
      generation_plan:
        output_dir: "assets/scenes"
        required_views: ["single"]
        execution_lane: "standard|bootstrap_builtin"
        bootstrap_allowed: false
        bootstrap_reason: "no_reference_seed|other"
        reference_inputs: []
        derived_from_asset_id: ""
      creation_status: "planned|created|stale|missing"
      existing_outputs: []
      review:
        status: "pending|approved|changes_requested"
        notes: ""

# rule:
# - source_script_selectors は「どこで使うか」
# - generation_plan.reference_inputs は「何を参照して生成するか」
# - reference_inputs を使うのは same character / same location / same camera 派生だけ
# - character_reference は全身の front / side / back 3面図を基本にする
# - image provider は常に codex_builtin_image（gpt-image-2 via Codex app-server）
# - execution_lane は既定で standard。reference_inputs が空で、かつ bootstrap_allowed=true のときだけ bootstrap_builtin を使ってよい
# - bootstrap_builtin という lane 名は互換のため維持するが、repo 全体では no-reference built-in image lane を意味する
# - derived_from_asset_id がある asset は常に standard
# - p550 の prompt 本文では `物語「<topic>」の sceneXX` / `sceneXX_cutYY` ではなく、具体的に見える人物・場所・道具・行為を書く
