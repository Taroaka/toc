# Minimal research output template (from docs/information-gathering.md)
#
# NOTE:
# - これはMVP向けの最小スキーマ。
# - 情報量を最大化したい場合は `workflow/research-template.production.yaml` を推奨。
topic: "string"
aliases: ["string"]

# Story-first baseline (必須)
story_baseline:
  # 「そもそもどんな話か」を最優先で明確化する。
  # 小ネタ/裏話/逸話はこの後でよい。
  canonical_synopsis:
    one_liner: "string"
    short_summary: "string" # 5-10行程度。誰が/何を求め/何が起き/どう決着するか。
    beat_sheet:
      - beat: "string"      # 10-20個程度の箇条書き（時系列）
  characters:
    protagonist: "string"
    key_allies: ["string"]
    key_antagonists: ["string"]
    core_goal: "string"
    stakes: "string"
    setting: "string"

# Scene plan (必須)
#
# 目的:
# - 後続の story/script/manifest で、調査した情報を scene に割り当てられるようにする。
# - 「小ネタばかり」にならないよう、まずストーリーを scene で分割して骨格を固定する。
#
# ルール（運用）:
# - scene_id は原則 1..20（最低20）。
# - 全体に効く情報は scene_id の opening / ending（例: 1, 19, 20）へ寄せる。
# - 途中のネタは該当 scene_id（複数可）へ割り当てる。
scene_plan:
  min_scene_count: 20
  scenes:
    - scene_id: 1
      role: "opening|development|turn|climax|ending"
      beat_summary: "string"      # 1-2行
      desired_emotion: "string"   # wonder/tension/relief...
    - scene_id: 2
      role: "opening|development|turn|climax|ending"
      beat_summary: "string"
      desired_emotion: "string"

# Structure / framework notes（任意・参考）
#
# 注意:
# - Hero's Journey（英雄の旅）への当てはめは「公式チェック」ではなく、見落とし防止の道具に留める。
# - fit が low でも失格ではない（物語価値は登場人物/世界観の多様性と、選択で作る）。
hero_story_validation:
  hero_journey_fit:
    fit: "high|medium|low"
    rationale: "string"
    missing_or_weak_beats: ["string"]
  narrative_arc:
    inciting_incident: "string"
    midpoint: "string"
    climax: "string"
    resolution: "string"

# Conflicts & selection cues（推奨）
#
# 目的:
# - 複数文献で矛盾がある場合に、後段（director/scriptwriter）が「選択」できる材料を残す。
# - 矛盾する要素の“ハイブリッド（混成）”は高得点になり得る一方で破綻リスクが高い。
#   混成を単一シーン/設定として確定させる場合は、人間承認が必要（運用）。
conflicts:
  - conflict_id: "C1"
    topic: "string"
    accounts:
      - account_id: "A"
        claim: "string"
        sources: ["string"]
      - account_id: "B"
        claim: "string"
        sources: ["string"]
    impact_on_story: "string"
    selection_notes:
      recommended_choice: "A|B|both_separated|hybrid_requires_approval"
      rationale: "string"
    hybrid_proposal:
      proposed: false
      mix_elements: ["string"]
      risks: ["string"]
      mitigations: ["string"]

hypothesis:
  initial_hypothesis:
    statement: "string"
    rationale: "string"
    assumptions:
      - assumption: "string"
        testable: true

issue_tree:
  root_question: "string"
  branches:
    - issue: "string"
      type: "what|why|how"
      status: "not_started|in_progress|answered|blocked"
      answer: "string"
      confidence: 0.0

knowledge_graph:
  nodes:
    - id: "string"
      type: "Person|Place|Event|Concept"
      label: "string"
  edges:
    - from: "string"
      to: "string"
      relation: "string"

engagement:
  hooks:
    - type: "mystery|counterintuitive|hidden_truth|emotional"
      content: "string"
      curiosity_score: 0.0
      scene_ids: [1]     # this hook best fits which scene(s)

metadata:
  collected_at: "ISO8601"
  sources_used: ["string"]
  confidence_score: 0.0

# Evaluator contract（推奨）
evaluation_contract:
  target_questions: ["string"]          # この調査で必ず答える問い
  must_cover: ["string"]                # synopsis / beat / setting など必須アンカー
  must_resolve_conflicts: ["string"]    # conflicts.topic として必ず扱う論点
  done_when: ["string"]                 # evaluator と共有する完了条件
