# Minimal research output template (from docs/information-gathering.md)
#
# NOTE:
# - これはMVP向けの最小スキーマ。
# - p100 は scene 分割ではなく、p200 が物語化できる素材を厚く残す。
# - 情報量を最大化したい場合は `workflow/research-template.production.yaml` を推奨。
topic: "string"
aliases: ["string"]

# Story materials（必須）
story_materials:
  canonical_story_dump: "string" # 原話/通俗版/重要版の筋を省略しすぎず厚めに書く。
  chronological_events:
    - event_id: "E1"
      event: "string"            # scene ではなく出来事単位。
      sources: ["S1"]
      confidence: 0.0
  characters:
    - character_id: "C1"
      name: "string"
      role: "string"
      motivations: ["string"]
      relationships:
        - target: "C2"
          relation: "string"
  setting:
    places: ["string"]
    time_or_era: "string"
    world_rules: ["string"]
  symbols_and_themes:
    - item_id: "SYM1"
      item: "string"
      meaning: "string"
      evidence_refs: ["P1"]
  emotional_material:
    - emotion: "string"
      trigger: "string"
      story_value: "string"
  adaptation_options:
    - option_id: "A1"
      proposal: "string"
      source_basis: ["S1"]
      risks: ["string"]

# Sources（必須）
source_inventory:
  - source_id: "S1"
    title: "string"
    url: "string"
    type: "primary|academic|encyclopedia|news|blog|video|other"
    reliability: "high|medium|low"
    accessed_at: "ISO8601"
    notes: "string"

source_passages:
  - passage_id: "P1"
    source_id: "S1"
    passage: "string"            # 短い抜粋または要約。長文引用しない。
    evidence_note: "string"
    confidence: 0.0

# Variants / conflicts（必須）
variants:
  - variant_id: "V1"
    name: "string"
    differences: ["string"]
    impact_on_story: "string"
    sources: ["S1"]

conflicts:
  - conflict_id: "C1"
    topic: "string"
    accounts:
      - account_id: "A"
        claim: "string"
        sources: ["S1"]
        confidence: 0.0
      - account_id: "B"
        claim: "string"
        sources: ["S2"]
        confidence: 0.0
    impact_on_story: "string"
    selection_notes:
      recommended_choice: "A|B|both_separated|hybrid_requires_approval"
      rationale: "string"
    hybrid_proposal:
      proposed: false
      mix_elements: ["string"]
      risks: ["string"]
      mitigations: ["string"]

facts:
  items:
    - fact_id: "F1"
      claim: "string"
      kind: "plot|character|setting|theme|symbol|historical_context|interpretation|other"
      confidence: 0.0
      verification: "verified|partially_verified|unverified"
      sources: ["S1"]
      notes: "string"

engagement:
  hooks:
    - hook_id: "H1"
      type: "mystery|counterintuitive|hidden_truth|emotional|connection|controversy"
      content: "string"
      curiosity_score: 0.0
      supporting_facts: ["F1"]

open_questions:
  - question_id: "Q1"
    question: "string"
    known_theories: ["string"]
    investigation_status: "unverified|in_progress|verified"
    sources: ["S1"]

handoff_to_story:
  recommended_focus: ["string"]
  must_preserve: ["string"]
  avoid_overstating: ["string"]
  selection_questions_for_p200: ["string"]

# Optional only: p200 を拘束しない粗い使い所メモ。
suggested_story_usage:
  - material_ref: "F1|H1|P1|E1"
    suggested_position: "opening|development|midpoint|climax|ending|any"
    rationale: "string"

metadata:
  collected_at: "ISO8601"
  sources_used: ["S1"]
  confidence_score: 0.0

evaluation_contract:
  target_questions: ["string"]
  must_cover: ["canonical_story_dump", "chronological_events", "source_passages", "conflicts"]
  must_resolve_conflicts: ["string"]
  done_when: ["p200 が追加調査なしで scene/beat 候補を作れる"]
