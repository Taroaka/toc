# Cut Blueprint Template v3.0
# p420 creates this structure, then materializes it into script.md and video_manifest.md.

cut_blueprint_version: "3.0"
legacy_compatibility:
  copy_to_scene_contract: false
  copy_legacy_cut_blueprint_fields: true
  note: "cut_contract.source_event_contract is canonical. scene_contract/cut_blueprint are legacy read-only projections and must not satisfy V3 gates."

source_scene:
  scene_id: "1"
  selector: "scene1"
  scene_intent_snapshot:
    importance: "medium" # low|medium|high|critical
    target_duration_seconds: 24
    dramatic_question: ""
    scene_spine: "setup -> pressure -> turn -> payoff -> handoff"
    value_shift:
      from: ""
      to: ""
      visible_evidence: []
    causal_turn: ""
    audience_information: []
    withheld_information: []
    reveal_constraints: []
    visual_thesis: ""
    handoff_to_next_scene: ""
    story_event_obligations:
      - event_id: ""
        source_events: []
        audience_knowledge_delta: ""
        causal_proof: ""
        visual_evidence: []
        required_roles: []
    role_coverage:
      required_roles: []
      must_not_collapse_to_protagonist_only: true
    audience_knowledge_plan:
      before_scene: []
      learned_during_scene: []
      still_unknown_after_scene: []
    visual_proof_obligations: []
    anti_redundancy_policy: "同じ story fact を別 cut で繰り返すだけなら cut 追加ではなく既存 cut を補強する"
    static_first_frame_rules:
      - "motion を説明せず、動画開始前後の静止状態で cut の証拠を見せる"
  scene_event_snapshot:
    schema_version: "scene_event_v1"
    event_logline: ""
    start_situation: ""
    source_story_beat_ids: []
    event_sequence:
      - beat_id: "scene1_event_setup"
        beat_function: "setup"
        what_happens: ""
        visible_action: ""
        visible_reaction: ""
        immediate_consequence: ""
        emotional_pressure: ""
        required_visual_evidence: []
      - beat_id: "scene1_event_pressure"
        beat_function: "pressure"
        what_happens: ""
        visible_action: ""
        visible_reaction: ""
        immediate_consequence: ""
        emotional_pressure: ""
        required_visual_evidence: []
      - beat_id: "scene1_event_turn"
        beat_function: "turn"
        what_happens: ""
        visible_action: ""
        visible_reaction: ""
        immediate_consequence: ""
        emotional_pressure: ""
        required_visual_evidence: []
      - beat_id: "scene1_event_payoff"
        beat_function: "payoff"
        what_happens: ""
        visible_action: ""
        visible_reaction: ""
        immediate_consequence: ""
        emotional_pressure: ""
        required_visual_evidence: []
    turning_event:
      source_event_beat_id: "scene1_event_turn"
      causal_turn_ref: "scene_intent.causal_turn"
    end_situation:
      value_shift_to_ref: "scene_intent.value_shift.to"
      visible_evidence_refs: ["scene1_event_payoff"]
    forbidden_event_changes: []

scene_cut_coverage_plan:
  coverage_strategy: "reverse_from_scene_event"
  source_schema_version: "scene_event_v1"
  min_cut_count:
    by_importance: 3
    by_duration: 3
    by_event_beats: 4
    selected: 4
    exception_reason: ""
  event_beat_inventory:
    - beat_id: "scene1_event_setup"
      beat_function: "setup"
      must_be_seen: true
      assigned_cut_ids: []
  candidate_function_labels:
    - setup
    - pressure
    - threshold
    - turn
    - reaction
    - handoff
    - custom
  scene_obligations:
    - source: dramatic_question
      evidence: ""
    - source: value_shift.visible_evidence
      evidence: []
    - source: causal_turn
      evidence: ""
    - source: story_event_obligations_legacy_projection
      evidence:
        - event_id: ""
          source_events: []
          audience_knowledge_delta: ""
          causal_proof: ""
          visual_evidence: []
          required_roles: []
    - source: reveal_constraints
      evidence: []
    - source: handoff_to_next_scene
      evidence: ""
  cut_assignments:
    - cut_index: 1
      obligation_id: ""
      cut_function: "pressure|threshold|reveal|reaction|payoff|handoff|custom"
      event_assignment:
        source_event_contract:
          primary_event_beat_id: ""
          source_event_beat_ids: []
      target_beat: ""
      visual_proof: ""
      audience_knowledge_delta: ""
      causal_proof: ""
      required_roles: []
      anti_redundancy_key: ""

cuts:
  - cut_id: 1
    selector: "scene1_cut1"
    cut_status: "active" # active|deleted
    deletion_reason: ""
    cut_contract:
      schema_version: "3.0"
      source_event_contract:
        primary_event_beat_id: "scene1_event_setup"
        source_event_beat_ids: ["scene1_event_setup"]
        event_beat_function: "setup"
        event_time_position: "before_trigger"
        source_event_summary: ""
        source_visible_action: ""
        source_visible_reaction: ""
        source_required_visual_evidence: []
        event_facts_to_preserve: []
        event_facts_not_to_invent: []
        allowed_reveal_info_ids: []
        forbidden_reveal_info_ids: []
        must_not_change: []
      cut_role: "main" # main|sub|transition|reaction|visual_payoff
      cut_function: "setup" # setup|pressure|threshold|turn|payoff|reaction|handoff
      intent_budget:
        primary_intent: ""
        secondary_intents_allowed: []
        forbidden_combined_intents:
          - "new_location_establishing + major_reveal + next_scene_handoff"
        assigned_obligation_ids: []
        overload_exception_reason: ""
        custom_function_reason: ""
      duration_intent: "short" # short|standard|hold
      target_duration_seconds: 6
      duration_exception:
        allowed: false
        reason: ""
      viewer_contract:
        target_beat: ""
        screen_question: ""
        dramatic_job: ""
        audience_knowledge_delta: ""
        causal_proof: ""
        visual_evidence: []
        required_roles: []
        anti_redundancy_key: ""
        emotional_micro_shift:
          from: ""
          to: ""
        mixed_affect_design:
          mode: "none|single|mixed|tension_release|bittersweet|aftertaste"
          optional: true
          apply_when: []
          positive_valence_thread: ""
          negative_valence_thread: ""
          arousal_strategy: "hold|rise|drop|spike|release"
          audience_rollercoaster_job: "none|bond|strain|release|reframe|aftertaste"
          design_intent: ""
          visible_support: []
          narration_support: []
          sound_or_rhythm_support: []
          handoff_effect: ""
          avoid_if:
            - "1 cut = 1 intent を壊す"
            - "scene_event にない事実を足す"
        audience_information: []
        withheld_information: []
        reveal_context:
          inherited_from_scene: []
          allowed_reveals_in_this_cut: []
          forbidden_until_later_cut: []
          forbidden_until_later_scene: []
        visual_proof: ""
        must_show: []
        must_avoid: []
        done_when: []
      cinematic_contract:
        pov: "third_person|subjective_pov|over_the_shoulder|insert|establishing"
        shot_size: "wide|medium|closeup|extreme_closeup|insert"
        camera_angle: "eye_level|low_angle|high_angle|overhead|tracking"
        camera_intent: ""
        subject_priority:
          primary: ""
          secondary: ""
          background: ""
        screen_geography:
          foreground: ""
          midground: ""
          background: ""
          screen_direction: "left_to_right|right_to_left|toward_camera|away_from_camera|static"
          entrance_exit: ""
        lighting_intent: ""
        edit_relation:
          previous_cut: ""
          next_cut: ""
      continuity_contract:
        location_ids: []
        location_variant_ids: []
        character_ids: []
        character_variant_ids: []
        object_ids: []
        object_variant_ids: []
        start_state:
          character_state: ""
          prop_state: ""
          spatial_state: ""
          time_state: ""
        end_state:
          character_state: ""
          prop_state: ""
          spatial_state: ""
          time_state: ""
        carry_forward_to_next_cut: []
        continuity_risks: []
      cut_handoff:
        receives_from_previous:
          anchor_id: ""
          anchor_type: "object|sound|gaze|gesture|movement|light|threat|question|none"
          visible_or_audible_form: ""
          expected_previous_cut_selector: ""
        delivers_to_next:
          anchor_id: ""
          anchor_type: "object|sound|gaze|gesture|movement|light|threat|question|terminal"
          visible_or_audible_form: ""
          expected_next_cut_selector: ""
      first_frame_contract:
        imageable: true
        image_role: "video_first_frame_candidate"
        source_event_beat_id: "scene1_event_setup"
        event_time_position: "before_trigger"
        event_fact_visible_in_still: ""
        not_yet_happened_in_still: []
        first_frame_brief: ""
        visible_start_state:
          character_state: ""
          prop_state: ""
          spatial_state: ""
          emotional_state: ""
          gaze_or_attention: ""
        motion_start_affordance:
          movable_subject: ""
          movement_vector: ""
          camera_start_reason: ""
        action_completion_state: "pre_action" # pre_action|early_action|mid_action|aftermath|hold
        static_first_frame_rule: ""
        must_be_static_evidence_not_motion: true
        must_include: []
        must_avoid: []
        composition_requirements:
          foreground: ""
          midground: ""
          background: ""
          light: ""
          frame_edge_handoff: ""
        still_done_when: []
      motion_contract:
        movable: true
        source_event_beat_id: "scene1_event_setup"
        starts_from_first_frame: true
        must_not_advance_to_event_beat_ids: []
        must_not_resolve_scene_turn_unless_primary_event_is_turn: true
        motion_brief: ""
        camera_motion: "static|slow_push|slow_pull|pan|tilt|tracking|handheld_subtle"
        subject_motion: ""
        environment_motion: ""
        emotional_change: ""
        start_from_visible_state: ""
        end_state: ""
        end_frame_brief: ""
        must_not_add: []
      narration_contract:
        schema_version: "narration_contract_v2"
        speakable_or_silent: true
        source_event_beat_ids: ["scene1_event_setup"]
        allowed_info_ids: []
        forbidden_info_ids: []
        must_not_advance_to_event_beat_ids: []
        must_not_explain_visible_action_as_caption: true
        narration_event_boundary: "same_event_only"
        story_role:
          narrative_position: "opening|middle|ending"
          cut_function: "setup|pressure|threshold|turn|payoff|reaction|handoff"
          voice_function: "information|emotion|causality|time|viewpoint|world_rule|contrast|meaning|aftertaste|silence"
          audience_state_before: ""
          audience_state_after: ""
          must_cover: []
          must_not_reveal: []
          done_when: []
        visual_distance:
          distance_policy: "stay_close|contextual|meaning_first|silent"
          visible_facts_in_frame: []
          narration_should_add: []
          must_not_caption_visible_action: true
          visual_overlap_allowed: false
          visual_overlap_reason: ""
        rhythm_and_timing:
          target_speech_seconds: 0
          min_speech_seconds: 0
          max_speech_seconds: 0
          start_timing: "immediate|after_visual_read|mid_cut|late_cut|none"
          end_timing: "before_cut_end|on_cut_end|after_visual_resolution|none"
          pause_intent: []
          audio_visual_sync_point: ""
        tts_readiness:
          normalization_policy: "kanji_public_hiragana_tts|mixed|dictionary_first"
          pronunciation_targets: []
          max_sentence_chars: 42
          tts_text_must_differ_from_text_when_needed: true
        # compatibility aliases for older readers
        role: "setup" # setup|fact|emotion|contrast|aftertaste|silent
        target_function: "derive_from_story_role_voice_function"
        must_cover:
          - "derive_from_story_role_must_cover"
        must_avoid:
          - "visible content captioning"
        done_when:
          - "derive_from_story_role_done_when"
        timing:
          start: "early" # early|mid|late|none
          end: "on_cut_end" # before_turn|on_cut_end|after_visual|none
        draft:
          text: ""
          status: "optional_draft|approved_by_human|superseded_by_p700"
        silence_reason: ""
      rhythm_contract:
        expected_duration_seconds: 8
        pacing: "quick|standard|slow_hold|spectacle_hold"
        comprehension_moment: ""
        cut_out_reason: ""
        audio_visual_sync_point: ""
        duration_exception:
          allowed: false
          reason: ""
      asset_dependency:
        character_ids_required: []
        object_ids_required: []
        location_ids_required: []
        variant_ids_required: []
        new_asset_requests: []
        reusable_anchor_ids: []
        reference_role: {}
      downstream_handoff:
        p500_asset:
          required_asset_ids: []
          asset_candidates: []
          continuity_anchor_needed: false
          new_asset_needed: false
          reuse_allowed: false
        p600_image:
          prompt_requirements: []
          reference_requirements: []
          first_frame_must_include: []
          first_frame_must_avoid: []
        p700_narration:
          narration_requirements: []
          narrative_position: "opening|middle|ending"
          cut_function: "setup|pressure|threshold|turn|payoff|reaction|handoff"
          voice_function: "information|emotion|causality|time|viewpoint|world_rule|contrast|meaning|aftertaste|silence"
          visual_distance_policy: "stay_close|contextual|meaning_first|silent"
          pronunciation_targets: []
          role: "setup|fact|emotion|contrast|aftertaste|silent"
          must_not_caption_visible_content: true
        p800_video:
          motion_requirements: []
          start_state: ""
          last_frame_or_end_state: ""
          must_not_add: []
        carries_to_next_cut: []
        carries_to_next_scene: []
    scene_contract_alias:
      cut_function: "<cut_contract.cut_function>"
      target_beat: "<cut_contract.viewer_contract.target_beat>"
      screen_question: "<cut_contract.viewer_contract.screen_question>"
      dramatic_job: "<cut_contract.viewer_contract.dramatic_job>"
      audience_knowledge_delta: "<cut_contract.viewer_contract.audience_knowledge_delta>"
      causal_proof: "<cut_contract.viewer_contract.causal_proof>"
      visual_evidence: "<cut_contract.viewer_contract.visual_evidence>"
      required_roles: "<cut_contract.viewer_contract.required_roles>"
      source_event_contract: "<cut_contract.source_event_contract>"
      anti_redundancy_key: "<cut_contract.viewer_contract.anti_redundancy_key>"
      visual_beat: "<cut_contract.viewer_contract.visual_proof>"
      first_frame_brief: "<cut_contract.first_frame_contract.first_frame_brief>"
      static_first_frame_rule: "<cut_contract.first_frame_contract.static_first_frame_rule>"
      motion_brief: "<cut_contract.motion_contract.motion_brief>"
      must_show: "<cut_contract.viewer_contract.must_show>"
      must_avoid: "<cut_contract.viewer_contract.must_avoid>"
      done_when: "<cut_contract.viewer_contract.done_when>"
    review:
      agent_review:
        status: "pending" # pending|passed|changes_requested|waived
        reason_keys: []
        notes: ""
      human_review:
        status: "pending" # pending|approved|changes_requested|waived
        notes: ""
      triangulation_review:
        same_target_beat: false
        image_supports_motion_start: false
        motion_reaches_declared_end_state: false
        narration_not_captioning_image: false
        reveal_constraints_preserved: false
        continuity_preserved: false
        handoff_visible_or_audible: false
