# Scene Outline / Cinematic Scene Contract Template
#
# 目的:
# - story.md と generation prompt の間で、scene の劇的責務を固定する。
# - p400 では完成 prompt を書かず、p600/p800 が迷わない scene/cut contract を作る。
# - keys は ASCII のままにし、値とコメントは日本語で書く。
# - 事実は research の fact_id / source_id に紐づけ、創作補完は creative_inventions に明示する。

scene_outline_metadata:
  topic: "<topic>"
  source_research: "output/<topic>_<timestamp>/research.md"
  source_story: "output/<topic>_<timestamp>/story.md"
  source_visual_value: "output/<topic>_<timestamp>/visual_value.md"
  created_at: "<ISO8601>"
  method_used: "cinematic_scene_contract"
  version: 2
  scene_count: 0

scene_design_rules:
  scene_count_strategy: "maximal_meaningful"
  scene_count_goal: "承認済み story の主要 beat を落とさず、独立した production scene として成立する範囲で scene 数を最大化する"
  scene_count_stop_condition: "これ以上 scene を増やしても独立した dramatic_question / value_shift / causal_turn を持てず、各 scene 内の cut 設計を厚くした方が品質が上がる"
  scene_count_review_required: true
  scene_specificity_required_layers:
    - "non_compressible_beat_inventory"
    - "scene_promotion_rule"
    - "unique_scene_responsibility"
    - "actor_force_coverage"
    - "object_meaning_ladder"
    - "concrete_handoff_chain"
    - "anti_template_language"
    - "abstract_function"
    - "concrete_event"
    - "story_grounding"
    - "non_replaceable_elements"
    - "concrete_story_elements_with_story_function"
    - "asset_story_function_usage"
    - "specificity_budget"
  canonical_event_coverage_matrix_required: true
  abstract_language_policy: "抽象表現は禁止しない。ただし abstract_function だけで終わらず、必ず source-grounded concrete_event / story_grounding を持つ"
  banned_generic_scene_phrases:
    - "主人公は前進できるか"
    - "次へ進む理由が生まれる"
    - "光が次の場面へ運ぶ"
    - "価値変化の兆し"
    - "場所の圧力"
    - "主人公の姿勢と視線"
  p400_does_not_write_final_prompt: true
  scene_must_have_value_shift: true
  scene_must_have_causal_turn: true
  cut_must_have_single_intent: true
  prompt_language: "ja"
  no_on_screen_text: true
  image_policy: "新規 still は continuity anchor が必要な cut に集中させ、既存 anchor を再利用できる場合は再利用する"

global_constraints:
  aspect_ratio: "9:16"
  visual_style: "実写映画調、自然な映画照明、実物セット感"
  global_must_include:
    - "前景/中景/背景の空間設計"
    - "観客が最初に読む主被写体"
  global_must_avoid:
    - "画面内テキスト"
    - "字幕"
    - "ウォーターマーク"
    - "ロゴ"
    - "アニメ/漫画/イラスト調"
  references:
    character_images: []
    style_images: []
    object_images: []
    location_images: []
    notes: "参照画像 path は metadata に保持し、prompt 本文には path を書かない"

story_truth:
  theme: "<story theme>"
  protagonist: "<protagonist>"
  reveal_order_summary: "<reveal order>"
  forbidden_changes:
    - "story.md の事実関係/reveal順序/主人公/themeを無断変更しない"

story_beat_coverage_matrix:
  - beat_id: "story_beat_01"
    source_story_selector: "story.beats[0]"
    beat_summary: ""
    irreversible: true
    assigned_scene_ids: []
    promotion_decision: "scene|cut|narration|omitted"
    promotion_reason: ""
    reveal_timing: "before|during|after"
    emotional_function: "hook|pressure|turn|payoff|aftertaste"
    visual_evidence_required: []
    risk_if_compressed: ""

canonical_event_coverage_matrix:
  policy_version: "canonical_event_coverage_matrix_v1"
  source: ["research", "story", "user_input", "asset_bible"]
  source_story_events:
    - source_event_id: ""
      source_event_summary: ""
      importance: "low|medium|high|critical"
      required: true
      must_appear_as: "scene|cut|narration|visual_motif|can_be_omitted"
      canonical_order_index: 0
      assigned_scene_ids: []
      assigned_event_beat_ids: []
      omission_reason: ""
      adaptation_change_reason: ""
      human_approval_required: false

scene_decision_log:
  - decision_id: "scene_decision_001"
    action: "add_scene|merge_scene|split_scene|delete_scene|reorder_scene"
    target_scene_ids: []
    source_story_beat_ids: []
    reason: ""
    rejected_alternative: ""
    impact_on_reveal_order: ""
    impact_on_duration: ""
    human_approval_required: false

scenes:
  - scene_id: 1
    scene_name: "<短いscene名>"
    importance: "low|medium|high|critical"
    target_duration_seconds: 24
    estimated_duration_seconds: 24
    phase: "opening|development|ordeal|transformation|ending"

    scene_intent:
      story_purpose: "この scene が物語全体で担う役割"
      dramatic_question: "この scene の間、観客が追う問い"
      scene_spine: "setup → pressure → turn → payoff → handoff の1文要約"
      value_shift:
        from: "scene開始時の状態"
        to: "scene終了時の状態"
        visible_evidence:
          - "画面だけで変化が読める証拠"
      causal_turn: "次 scene を発生させる不可逆の出来事/決断/発見"
      audience_information:
        - "この scene で観客に渡す情報"
      withheld_information:
        - "この scene ではまだ見せない情報"
      reveal_constraints:
        - "早出し禁止の情報"
      affect_transition: "観客感情の変化"
      character_state:
        start: "人物の心理/関係/身体状態"
        end: "scene終了時の心理/関係/身体状態"
        visible_behavior:
          - "表情/姿勢/距離/手の動きなど"
      visual_thesis: "この scene を代表する映画的な一枚絵の考え方"
      handoff_to_next_scene: "次 scene へつなぐ視覚/音/因果アンカー。最終 scene は terminal_resolution"
      scene_conflict_engine:
        desire: "この scene で主体が欲しているもの"
        obstacle: "それを妨げる力"
        stakes: "失敗すると何を失うか"
        escalation: "scene内で圧力がどう上がるか"
        no_return_point: "後戻りできなくなる瞬間"
        visible_pressure:
          - "画面で圧力として読めるもの"
      audience_knowledge_delta:
        before_scene:
          - "観客がすでに知っていること"
        learned_during_scene:
          - "このsceneで初めて知ること"
        misdirected_or_reframed:
          - "意味が反転・再解釈される情報"
        still_unknown_after_scene:
          - "まだ隠す情報"
        forbidden_early_reveals:
          - "ここで見せてはいけないもの"
      handoff_chain:
        incoming:
          anchor_id: "opening_or_previous_anchor"
          anchor_type: "object|sound|gaze|gesture|threat|question|none"
          visible_or_audible_form: ""
        outgoing:
          anchor_id: "next_scene_anchor"
          anchor_type: "object|sound|gaze|gesture|threat|question|terminal"
          next_scene_selector: ""
          required_next_scene_start_pressure: ""
      object_arc:
        - object_id: ""
          first_meaning: ""
          current_scene_meaning: ""
          later_meaning: ""
          visible_state_in_this_scene: ""
          must_not_show_yet: []
      story_specificity:
        non_compressible_beat: "この scene を cut に圧縮してはいけない不可逆 beat"
        scene_promotion_reason: "この beat を scene に昇格させる理由。独立した問い/価値変化/因果 turn を明記する"
        unique_scene_responsibility: "物語全体でこの scene だけが担う責務"
        actor_forces:
          protagonist: "この scene で変化を受ける人物/主体"
          opposing: []
          helping: []
          observing: []
          pressure_method: "誰が、何によって、主人公や状況へ圧力をかけるか"
        meaning_ladder:
          protagonist_stage: "主人公の意味/関係/自己認識がどの段階にあるか"
          relationship_stage: "関係性がどの段階にあるか"
          object_or_setpiece_stage: "物語上の道具/舞台装置の意味がどの段階にあるか"
        concrete_handoff:
          incoming_trigger: "前 scene から来た具体的な圧力/物/音/視線/行為"
          outgoing_anchor: "次 scene に渡す具体的な圧力/物/音/視線/行為"
          outgoing_pressure: "なぜ次 scene が発生せざるを得ないか"
        anti_template_language:
          banned_generic_phrases_absent: false
          story_specific_terms: []
          specificity_note: "固有名詞、道具、関係、場所、行為のうち複数を入れて抽象語を避ける"

    scene_generation:
      schema_version: "scene_generation_v1"
      scene_authoring_context:
        schema_version: "scene_authoring_context_v1"
        topic: "<topic>"
        scene_id: 1
        scene_index: 1
        scene_title: ""
        story_scope: {}
        source_beats: []
        canonical_event_policy:
          source_story_events: "top-level canonical_event_coverage_matrix を参照"
          scene_specificity: "source beat を scene_event の具体出来事へ接地する"
        scene_count_policy:
          maximize_meaningful_scene_count: true
          do_not_fix_cut_count_in_prompt: true
          cut_count_is_derived_by: "scene_cut_coverage_plan"
      scene_prompt_payload:
        schema_version: "scene_prompt_payload_v1"
        prompt: "この scene が物語内で何を成立させるかを設計し、scene 正本を出力する。後段実行情報は含めない。"
        input_refs: ["story.md", "research.md", "visual_value.md", "canonical_event_coverage_matrix", "asset_bible"]
        required_outputs: ["scene_intent", "scene_event", "scene_character_state_timeline", "scene_film_coverage_plan", "scene_cut_coverage_plan", "forbidden_event_changes"]
        constraints: ["scene 正本生成だけに使う", "後段の画像・音声・動画実行情報を含めない", "scene_event は物語事実に限定する"]
      scene_debug_prompt_source:
        schema_version: "scene_debug_prompt_source_v1"
        not_sent_to_agent: true
        source_story_beat_ids: []
        source_beats: []
        source_origin: "user_input|script|canonical_reference|asset_bible|inferred|adaptation_choice"
        adaptation_choices: []
        excluded_from_payload: []
        forbidden_event_changes_source: "scene_event.forbidden_event_changes"
      scene_generation_contract:
        schema_version: "scene_generation_contract_v1"
        required_outputs: ["scene_intent", "scene_event", "scene_character_state_timeline", "scene_film_coverage_plan", "scene_cut_coverage_plan", "forbidden_event_changes"]
        scene_event_schema_version: "scene_event_v1"
        payload_boundary: "scene_prompt_payload は scene 正本生成だけに使う"

    scene_event:
      schema_version: "scene_event_v1"
      event_logline: "sceneで実際に起きる出来事。演出語ではなく物語事実を書く"
      start_situation: "scene開始時の人物・場所・物・関係の状態"
      source_story_beat_ids: []
      story_specificity:
        canonical_specificity:
          description: "原典・既知筋・ユーザー入力に由来する、この物語で欠かせない出来事や設定"
          required_elements: []
        character_specificity:
          description: "この物語の人物名、役割、欲望、弱点、関係性に固有の要素"
          required_elements: []
        relationship_specificity:
          description: "人物同士の支配、敵対、助力、誤解、約束、秘密などの関係性"
          required_elements: []
        object_specificity:
          description: "物語上の小道具、証拠、呪い、鍵、手紙、靴などの機能"
          required_elements: []
        location_specificity:
          description: "その場所が物語上どんな制約・圧力・誘惑・境界として働くか"
          required_elements: []
        rule_specificity:
          description: "魔法の制約、時間制限、社会制度、約束、禁忌など、その物語固有のルール"
          required_elements: []
        visual_specificity:
          description: "その物語でしか成立しない画面上の証拠、身体状態、痕跡、配置"
          required_elements: []
      event_sequence:
        - beat_id: "scene1_event_setup"
          beat_function: "setup"
          source_story_beat_ids: []
          abstract_function:
            dramatic_job: ""
            value_shift_role: ""
            emotional_pressure_role: ""
            causal_role: ""
          concrete_event:
            who: []
            where: ""
            what_happens: ""
            conflict_or_constraint: ""
            object_or_trace: []
            visible_action: ""
            visible_reaction: ""
            immediate_consequence: ""
            required_visual_evidence: []
          story_grounding:
            source_origin: "user_input|script|canonical_reference|asset_bible|inferred|adaptation_choice|invented_candidate"
            source_story_beat_ids: []
            source_confidence: "high|medium|low"
            source_text_or_summary: ""
            adaptation_reason: ""
            human_approval_required: false
            non_replaceable_elements:
              - element_id: ""
                type: "character|object|location|relationship|rule|event|visual_evidence"
                value: ""
                why_non_replaceable: ""
            replaceability_check:
              would_survive_character_swap: false
              would_survive_object_swap: false
              would_survive_location_swap: false
              note: ""
            concrete_story_elements:
              - element_id: ""
                element_type: "character|object|location|gesture|trace|rule|relationship|sound|light"
                concrete_description: ""
                story_function: "obstacle|proof|temptation|deadline|status_marker|secret_holder|memory_trigger|threshold|handoff|contrast|pressure|reward|loss"
                appears_in_event_beat_ids: []
                visible_form: ""
                must_not_be_generic: true
            asset_story_function_usage:
              - asset_id: ""
                asset_type: "character|object|location"
                used_in_scene: true
                used_in_event_beat_ids: []
                story_function_in_scene: "obstacle|proof|helper|pressure|threshold|deadline|status_marker|secret|handoff"
                visible_or_hidden: "visible|hidden|hinted|offscreen"
                reason_if_unused: ""
            confidence: "high|medium|low"
          specificity_budget:
            max_primary_story_elements: 3
            max_secondary_story_elements: 3
            required_element_types: ["character", "location", "conflict_or_constraint", "visual_evidence"]
            optional_element_types: ["object", "sound", "weather"]
            reject_if: ["decorative_detail_without_story_function", "too_many_unrelated_objects", "concrete_but_not_source_grounded"]
            reject_decorative_detail_without_story_function: true
          what_happens: ""
          visible_action: ""
          visible_reaction: ""
          immediate_consequence: ""
          emotional_pressure: ""
          required_visual_evidence: []
          story_information_revealed_ids: []
        - beat_id: "scene1_event_pressure"
          beat_function: "pressure"
          source_story_beat_ids: []
          what_happens: ""
          visible_action: ""
          visible_reaction: ""
          immediate_consequence: ""
          emotional_pressure: ""
          required_visual_evidence: []
          story_information_revealed_ids: []
        - beat_id: "scene1_event_turn"
          beat_function: "turn"
          source_story_beat_ids: []
          what_happens: ""
          visible_action: ""
          visible_reaction: ""
          immediate_consequence: ""
          emotional_pressure: ""
          required_visual_evidence: []
          story_information_revealed_ids: []
        - beat_id: "scene1_event_payoff"
          beat_function: "payoff"
          source_story_beat_ids: []
          what_happens: ""
          visible_action: ""
          visible_reaction: ""
          immediate_consequence: ""
          emotional_pressure: ""
          required_visual_evidence: []
          story_information_revealed_ids: []
      turning_event:
        source_event_beat_id: "scene1_event_turn"
        causal_turn_ref: "scene_intent.causal_turn"
        irreversible_change: ""
      end_situation:
        value_shift_to_ref: "scene_intent.value_shift.to"
        outcome: ""
        character_position: ""
        object_state: ""
        relationship_state: ""
        new_pressure: ""
        visible_evidence_refs: ["scene1_event_payoff"]
      offscreen_context: []
      forbidden_event_changes: []

    grounding:
      research_refs:
        fact_ids: []
        source_ids: []
        notes: "事実根拠。創作補完は creative_inventions に分ける"
      creative_inventions:
        - invention: "創作補完の内容"
          purpose: "映像化/感情設計上の目的"
          must_not_conflict_with: []

    visual_world:
      setting:
        location: "具体的な場所またはセット"
        time_of_day: "朝|昼|夕方|夜|不明"
        weather: "天候/空気"
        environment: "場所の質感、音、密度"
      spatial_plan:
        screen_geography: "前景/中景/背景、入口/出口、進行方向"
        continuity_anchors:
          - "前後sceneで一致させる光/方向/物/人物状態"
      characters_present: []
      props_set_pieces: []
      object_ids: []
      location_ids: []

    handoff_notes:
      p500_asset:
        - "asset 化すべき人物/場所/道具/状態"
      p600_image:
        - "still prompt で守るべき visual proof / 初期状態"
      p700_narration:
        - "ナレーションで補うこと / 補わないこと"
      p800_video:
        - "motion で守ること"

    coverage_review:
      audience_information_covered: false
      visualizable_action_covered: false
      value_shift_visible: false
      causal_turn_visible: false
      scene_specificity_gate_passed: false
      next_scene_connection_checked: false
      notes: "未達なら cut 追加または scene 再設計"

    cuts:
      - cut_id: 1
        cut_role: "main|sub|transition|reaction|visual_payoff"
        cut_function: "setup|pressure|threshold|turn|payoff|reaction|handoff"
        duration_intent: "short|standard|hold"
        target_duration_seconds: 8
        target_beat: "この cut で伝える1つのこと"
        screen_question: "この cut の間、観客が画面から読む問い"
        dramatic_job: "scene全体のpressure/turn/payoffのどこを担当するか"
        visual_beat: "画として何が見えるか"
        must_show:
          - "画・音・動きのどこかで必ず見せるもの"
        must_avoid:
          - "drift / reveal破り / 説明過多など"
        done_when:
          - "reviewer が完了判断できる条件"
        first_frame_brief: "動画が動き出す直前に見えている初期状態。prompt本文に制作メタは入れない"
        motion_brief: "p800 motion prompt 専用。p600 image prompt authoring では参照しない"
        narrative_position: "opening|middle|ending"
        voice_function: "information|emotion|causality|time|viewpoint|world_rule|contrast|meaning|aftertaste|silence"
        visual_distance_policy: "stay_close|contextual|meaning_first|silent"
        pronunciation_targets: []
        narration_role: "setup|fact|emotion|contrast|aftertaste|silent"
        narration_text: "<必要ならナレーション。silent cut は空文字>"
        asset_dependency_hint:
          character_ids: []
          object_ids: []
          location_ids: []
          reusable_still_candidates: []
