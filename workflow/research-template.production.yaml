# Production research output template (story-material-first)
#
# 目的:
# - p100 は「構成表を作る工程」ではなく、後段で削れるだけの物語素材を増やす工程。
# - p200 が scene / beat / emotion curve / candidate selection を作れるよう、原話・版差・根拠を厚く残す。
# - scene_plan と scene_ids は任意メモ。必須化しない。
#
# 注意:
# - 出典が不十分な項目は "unverified" を明記し、後で検証できる形で残す。
# - 長文引用は避け、source_passages は短い抜粋または要約に留める。
topic: "string"
aliases: ["string"]

# === 0) Story materials（最優先・必須） ===
story_materials:
  canonical_story_dump: "string" # 20-60行目安。誰が/何を求め/何が起き/どう決着するかを厚く書く。
  chronological_events:
    - event_id: "E1"
      event: "string"            # scene ではなく出来事単位
      story_function: "setup|turn|reversal|revelation|climax|aftermath"
      involved_characters: ["C1"]
      source_refs: ["S1", "P1"]
      confidence: 0.0
  characters:
    - character_id: "C1"
      name: "string"
      role: "string"
      motivations: ["string"]
      relationships:
        - target: "C2"
          relation: "string"
          evidence_refs: ["P1"]
      ambiguity_or_variant_notes: "string"
  setting:
    places:
      - place_id: "L1"
        name: "string"
        description: "string"
        source_refs: ["S1"]
    time_or_era: "string"
    world_rules:
      - rule: "string"
        evidence_refs: ["P1"]
  symbols_and_themes:
    - item_id: "SYM1"
      item: "string"
      meaning: "string"
      story_value: "string"
      evidence_refs: ["P1"]
  emotional_material:
    - emotion: "string"
      trigger: "string"
      why_it_matters: "string"
      source_refs: ["S1"]
  adaptation_options:
    - option_id: "A1"
      proposal: "string"
      source_basis: ["S1"]
      expected_gain: "string"
      risks: ["string"]

# === 1) Sources（必須: 出典の棚卸し） ===
source_inventory:
  - source_id: "S1"
    title: "string"
    url: "string"
    type: "primary|academic|encyclopedia|news|blog|video|other"
    reliability: "high|medium|low"
    accessed_at: "ISO8601"
    notes: "string"

source_passages:
  - passage_id: "P1"
    source_id: "S1"
    passage: "string"
    evidence_note: "string"
    related_material_refs: ["E1", "F1", "SYM1"]
    confidence: 0.0

# === 2) Variants / conflicts（必須: p200 の選択材料） ===
variants:
  - variant_id: "V1"
    name: "string"
    differences: ["string"]
    impact_on_story: "string"
    source_refs: ["S1"]

conflicts:
  - conflict_id: "C1"
    topic: "string"
    accounts:
      - account_id: "A"
        claim: "string"
        sources: ["S1"]
        confidence: 0.0
      - account_id: "B"
        claim: "string"
        sources: ["S2"]
        confidence: 0.0
    impact_on_story: "string"
    selection_notes:
      recommended_choice: "A|B|both_separated|hybrid_requires_approval"
      rationale: "string"
    hybrid_proposal:
      proposed: false
      mix_elements: ["string"]
      expected_score_gain: "string"
      risks: ["string"]
      mitigations: ["string"]

# === 3) Facts & claims（映像/台本に使える粒度） ===
facts:
  items:
    - fact_id: "F1"
      claim: "string"
      kind: "plot|character|setting|theme|symbol|historical_context|interpretation|other"
      confidence: 0.0
      verification: "verified|partially_verified|unverified"
      sources: ["S1"]
      notes: "string"

# === 4) Engagement / open questions（scene配賦ではなく素材価値） ===
engagement:
  hooks:
    - hook_id: "H1"
      type: "mystery|counterintuitive|hidden_truth|emotional|connection|controversy"
      content: "string"
      curiosity_score: 0.0
      supporting_facts: ["F1"]
  tension_points:
    - tension_id: "T1"
      topic: "string"
      positions: ["string"]
      narrative_potential: "string"
      sources: ["S1"]

open_questions:
  - question_id: "Q1"
    question: "string"
    known_theories: ["string"]
    investigation_status: "unverified|in_progress|verified"
    sources: ["S1"]
    p200_handling: "ignore|treat_as_hypothesis|ask_user|additional_research"

# === 5) Synthesis / handoff（p200へ渡す判断材料） ===
synthesis:
  governing_thought: "string"
  scqa:
    situation: "string"
    complication: "string"
    question: "string"
    answer: "string"
  insight_groups:
    - group_theme: "string"
      synthesized_insight: "string"
      supporting_items: ["F1", "H1", "P1"]

handoff_to_story:
  recommended_focus: ["string"]
  must_preserve: ["string"]
  avoid_overstating: ["string"]
  selection_questions_for_p200: ["string"]
  likely_candidate_angles:
    - candidate_hint: "string"
      supporting_refs: ["E1", "F1", "H1"]

# Optional only: p200 を拘束しない粗い使い所メモ。
suggested_story_usage:
  - material_ref: "F1|H1|P1|E1"
    suggested_position: "opening|development|midpoint|climax|ending|any"
    rationale: "string"

production_notes:
  do:
    - "string"
  dont:
    - "string"
  policy_risks:
    - risk: "string"
      mitigation: "string"

metadata:
  collected_at: "ISO8601"
  sources_used: ["S1"]
  confidence_score: 0.0
  completeness_score: 0.0
  engagement_score: 0.0
  hypothesis_validation_rate: 0.0
