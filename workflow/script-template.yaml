# Minimal script output template (from docs/script-creation.md)
script_metadata:
  topic: "string"
  source_story: "output/<topic>_<timestamp>/story.md"
  source_visual_value: "output/<topic>_<timestamp>/visual_value.md"
  created_at: "ISO8601"
  target_duration: 60
  aspect_ratio: "9:16"
  affect_design_reference: "docs/affect-design.md"
  narration_source_of_truth: "script.md"
  visual_intent_source_of_truth: "script.md"
  generation_execution_source_of_truth: "video_manifest.md"
  tts_text_usage_boundary: "tts_text is the final ElevenLabs text for TTS only; image/video generators must not use it as their primary source"
  elevenlabs:
    provider: "elevenlabs"
    model_id: "eleven_v3"
    prompt_contract_version: "v3_tagged_context_v1"
    default_stability_profile: "creative"
    text_policy: "hiragana_plus_audio_tags"

subagent_trace:
  - subagent_id: "scene-draft-001"
    role: "scene_draft|scene_set_review|scene_count_coverage|dramatic_structure|reveal_order|duration_density|visual_production|handoff_integrity|scene_detail_review|cut_draft|cut_review|cut_merge|narration_draft|script_review|production_readiness"
    input_artifact: "output/<topic>_<timestamp>/story.md"
    output_artifact: "output/<topic>_<timestamp>/scratch/script_scene01.md"
    accepted_by_main: false
    reason: "string"

human_change_requests:
  - request_id: "hr-001"
    source: "human_script_review"
    created_at: "ISO8601"
    raw_request: "string"
    original_selectors: ["scene3_cut2"]
    current_selectors: ["scene3.1_cut2.1"]
    normalized_actions:
      - action: "update_visual_beat"
        target:
          scene_id: "3.1"
          cut_id: "2.1"
        payload:
          visual_beat: "string"
      - action: "update_scene_contract"
        target:
          scene_id: "3.1"
          cut_id: "2.1"
        payload:
          target_beat: "string"
          must_show: ["string"]
          must_avoid: []
          done_when: ["string"]
    status: "pending|normalized|applied|verified|waived"
    requires_user_approval: true
    approval_reason: "changes_facts|changes_reveal|changes_scope|changes_asset_plan|other"
    approval_status: "not_needed|pending|approved|rejected"
    resolution_notes: ""
    applied_manifest_targets: ["scene3.1_cut2.1:image_generation"]

human_review_criteria:
  narration:
    - "昔話/作品文脈として自然か"
    - "reveal 順序を壊していないか"
    - "ひらがな寄せ + audio tag で違和感がないか"
    - "映像より先走っていないか"
    - "説明過多になっていないか"

scene_set_review:
  status: "pending|approved|changes_requested|skipped"
  scene_count_strategy:
    mode: "maximal_meaningful"
    expansion_goal: "承認済み story の主要 beat を落とさず、独立した劇的変化を持つ production scene として成立する範囲で最大化する"
    stop_condition: "次に追加する scene が既存 scene と同じ dramatic_question / value_shift / causal_turn しか持てず、scene 数を増やすより cut 設計を厚くした方が品質が上がる"
    approval_questions:
      - "独立 scene 化すべき願望の発生、拒絶、選択、変身、対決、証拠 reveal、照合、帰結が既存 scene に埋もれていないか"
      - "次に追加できる scene は何か"
      - "その候補を scene 追加ではなく cut 増厚へ回す理由は何か"
  scene_specificity_gate:
    non_compressible_beat_inventory: "pending|passed|changes_requested"
    scene_promotion_rule: "pending|passed|changes_requested"
    unique_scene_responsibility: "pending|passed|changes_requested"
    actor_force_coverage: "pending|passed|changes_requested"
    object_meaning_ladder: "pending|passed|changes_requested"
    concrete_handoff_chain: "pending|passed|changes_requested"
    anti_template_language: "pending|passed|changes_requested"
    banned_generic_scene_phrases:
      - "主人公は前進できるか"
      - "次へ進む理由が生まれる"
      - "光が次の場面へ運ぶ"
      - "価値変化の兆し"
      - "場所の圧力"
      - "主人公の姿勢と視線"
  critic_assignment:
    critic_1: "scene_count_coverage"
    critic_2: "dramatic_structure + reveal_order"
    critic_3: "duration_density"
    critic_4: "visual_production"
    critic_5: "handoff_integrity"
  reviewer_roles:
    - role: "scene_count_coverage"
      responsibility: "承認済み story の主要 beat が scene として最大限展開され、非圧縮 beat と scene 昇格理由が明示されているかを評価する"
      blocking_if: "独立 scene 化すべき beat が既存 scene 内に埋もれている"
    - role: "dramatic_structure"
      responsibility: "各 scene が独立した dramatic_question / value_shift / causal_turn を持つかを評価する"
      blocking_if: "追加/既存 scene が同じ問い・同じ価値変化・同じ因果 turn を重複している"
    - role: "reveal_order"
      responsibility: "scene 追加/分割が reveal の早出し、欠落、順序破壊を起こしていないかを評価する"
      blocking_if: "後半で見せるべき情報が早出しされる、または重要 reveal が消える"
    - role: "duration_density"
      responsibility: "目標尺、scene 重要度、cut 数から scene 追加と cut 増厚のどちらが品質に効くかを評価する"
      blocking_if: "scene を増やすべき範囲で cut 増厚に逃げている、またはその逆"
    - role: "visual_production"
      responsibility: "追加 scene が p500/p600/p800 へ渡せる visible evidence、actor forces、道具/舞台装置の意味段階、visual thesis を持つかを評価する"
      blocking_if: "scene が説明だけで、画面上の人物・場所・道具・行為に翻訳できない"
    - role: "handoff_integrity"
      responsibility: "scene 間の因果、問い、視線・音・道具などの concrete handoff が途切れていないかを評価する"
      blocking_if: "scene 間の接続が narration 依存で、次 scene を発生させる因果が弱い"
  review_policy:
    agent_review: "required"
    human_review: "required|optional|skipped"
  review_loop:
    status: "pending|running|passed|changes_requested|failed"
    current_round: 0
    max_rounds: 5
    final_report: "scene_set_review.md"
  agent_review:
    status: "pending|passed|changes_requested"
    reason_keys: []
    reason_messages: []
  auto_apply_policy:
    enabled: true
    allowed_actions: ["add_scene", "delete_scene", "merge_scene", "split_scene", "reorder_scene", "update_scene_intent", "strengthen_transition"]

scene_detail_review:
  status: "pending|approved|changes_requested|skipped"
  criteria:
    target_total_video_duration_minutes: "5-10"
    cut_duration_assumption_seconds: "4-15"
    required_checks:
      - "全体 scene 数と scene 重要度から、この scene に必要な尺を見積もる"
      - "提案 cut 数だけで必要尺と内容を満たせるか判断する"
      - "1 cut しかない場合は 4-15 秒程度にしかならないことを明示する"
      - "この scene で見せるべき内容が cut に全て載っているか確認する"
      - "次 scene の内容も読み、最終 cut が次 scene につながるか判断する"
      - "つながらない場合は cut 追加または最終 cut の増厚を要求する"
      - "この scene が最大化された scene set の中で独立した問い・価値変化・因果 turn を持つか確認する"
      - "この scene をさらに分割すべきか、または cut 設計を厚くすべきか判断する"
      - "この scene の非圧縮 beat、scene 昇格理由、固有責務、actor forces、道具/舞台装置の意味段階、concrete handoff、anti-template language を確認する"
  reviewer_roles:
    - role: "scene_detail_structure"
      responsibility: "単一 scene の必要性、内部整合、独立した劇的変化を評価する"
    - role: "scene_detail_density"
      responsibility: "scene 内の情報量と cut 数が重要度・尺に合っているかを評価する"
    - role: "scene_detail_handoff"
      responsibility: "前後 scene との因果接続と handoff が足りるかを評価する"
  review_policy:
    agent_review: "required"
    human_review: "required|optional|skipped"
  review_loop:
    status: "pending|running|passed|changes_requested|failed"
    current_round: 0
    max_rounds: 5
    final_report: "scene_detail_review.md"
  agent_review:
    status: "pending|passed|changes_requested"
    reason_keys: []
    reason_messages: []

cut_blueprint_review:
  status: "pending|approved|changes_requested|skipped"
  critic_assignment:
    critic_1: "cut_intent_isolation"
    critic_2: "scene_event_coverage"
    critic_3: "first_frame_motion_readiness"
    critic_4: "multimodal_event_boundary_coverage"
    critic_5: "duration_density_and_handoff"
  cut_blueprint_gate:
    cut_intent_isolation: "pending|passed|changes_requested"
    scene_event_coverage: "pending|passed|changes_requested"
    event_beat_reference_integrity: "pending|passed|changes_requested"
    first_frame_motion_readiness: "pending|passed|changes_requested"
    event_first_frame_alignment: "pending|passed|changes_requested"
    multimodal_event_boundary_coverage: "pending|passed|changes_requested"
    source_event_preservation: "pending|passed|changes_requested"
    no_unapproved_event_invention: "pending|passed|changes_requested"
    event_motion_boundary: "pending|passed|changes_requested"
    event_narration_boundary: "pending|passed|changes_requested"
    event_context_for_cut_ready: "pending|passed|changes_requested"
    causal_proof_coverage: "pending|passed|changes_requested"
    role_coverage: "pending|passed|changes_requested"
    audience_knowledge_delta_coverage: "pending|passed|changes_requested"
    anti_redundancy_gate: "pending|passed|changes_requested"
    duration_density_and_handoff: "pending|passed|changes_requested"
  reviewer_roles:
    - role: "cut_intent_isolation"
      responsibility: "1 cut が 1 intent に限定され、場所移動/reveal/感情反転/説明/反応を同時に背負っていないかを評価する"
    - role: "scene_event_coverage"
      responsibility: "固定順ではなく scene_event.event_sequence[] から逆算され、cut_contract.source_event_contract が event beat を網羅しているかを評価する"
    - role: "first_frame_motion_readiness"
      responsibility: "first_frame_brief が p600 still の入力として完結し、motion_brief は p800 専用入力として分離されているかを評価する"
    - role: "multimodal_event_boundary_coverage"
      responsibility: "event_context_for_cut と各 contract だけで p600/p700/p800 へ渡せるか、motion_brief や scene_event 全体が p600 に漏れていないかを評価する"
    - role: "duration_density_and_handoff"
      responsibility: "重要度・尺・cut数・最終cutのhandoffが十分かを評価する"
  review_policy:
    agent_review: "required"
    human_review: "required|optional|skipped"
  review_loop:
    status: "pending|running|passed|changes_requested|failed"
    current_round: 0
    max_rounds: 5
    final_report: "cut_blueprint_review.md"
  agent_review:
    status: "pending|passed|changes_requested"
    reason_keys: []
    reason_messages: []

production_readiness_review:
  status: "pending|approved|changes_requested|skipped"
  review_policy:
    agent_review: "required"
    human_review: "required|optional|skipped"
  review_loop:
    status: "pending|running|passed|changes_requested|failed"
    current_round: 0
    max_rounds: 5
    final_report: "production_readiness_review.md"
  council:
    design_owner:
      role: "only_editor"
      may_edit_downstream_design_artifacts: true
    advisory_agents:
      - role: "structure_auditor"
        responsibility: "script の骨格、因果、scene/cut 接続、破綻を評価する"
        may_edit_downstream_design_artifacts: false
      - role: "duration_auditor"
        responsibility: "cut 数と台本から 5-10 分動画の尺を予測し、不足を特定する"
        may_edit_downstream_design_artifacts: false
      - role: "quality_auditor"
        responsibility: "尺/骨格の弱点から scene/cut 追加、cut 増厚、映像品質改善を提案する"
        may_edit_downstream_design_artifacts: false
      - role: "orchestrator"
        responsibility: "各 auditor の意見を統合し、Design Owner 向け patch brief にする"
        may_edit_downstream_design_artifacts: false
  agent_review:
    status: "pending|passed|changes_requested"
    reason_keys: []
    reason_messages: []

